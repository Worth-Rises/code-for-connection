# Nginx configuration for Code for Connection
# Routes API requests to the backend, serves the React app for everything else
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # API requests go to the Express backend
    location /api/ {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # WebSocket connections for real-time call signaling
    location /socket.io/ {
        proxy_pass http://signaling:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Everything else serves the React app (single-page app routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
